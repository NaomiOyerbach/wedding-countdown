<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>חתונה – שמחה & אסתי</title>
  <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@300;400;600;700;800&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --pink-light: #fce4ec;
      --pink-mid:   #f48fb1;
      --pink-dark:  #c2185b;
      --rose:       #e91e63;
    }

    html, body {
      height: 100%;
      font-family: 'Assistant', sans-serif;
      overflow: hidden;
    }

    /* ── BACKGROUND ── */
    #bg-layer {
      position: fixed; inset: 0; z-index: 0;
      background: linear-gradient(135deg, #fce4ec 0%, #f8bbd0 35%, #fce4ec 60%, #fff 100%);
    }

    /* ── HEARTS CANVAS ── */
    #hearts-canvas { position: fixed; inset: 0; z-index: 1; pointer-events: none; }

    /* ── PAGE LAYOUT ── */
    #page {
      position: relative; z-index: 2;
      height: 100vh;
      display: flex; align-items: center; justify-content: center;
      gap: 1.6rem;
      padding: 1.5rem;
    }

    /* ══════════════════════════════
       GALLERY STRIPS
    ══════════════════════════════ */
    .gallery-strip {
      flex: 0 0 150px;
      width: 150px;
      height: min(82vh, 640px);
      position: relative;
      border-radius: 1.6rem;
      overflow: hidden;
      background: rgba(255,255,255,0.22);
      border: 1.5px solid rgba(255,255,255,0.55);
      box-shadow: 0 8px 36px rgba(194,24,91,0.13);
      animation: cardIn 1s 0.3s cubic-bezier(.23,1,.32,1) both;
    }
    .gallery-strip::before {
      content: ''; position: absolute; top: 0; left: 0; right: 0;
      height: 90px; z-index: 2; pointer-events: none;
      background: linear-gradient(to bottom, rgba(252,228,236,0.96) 0%, transparent 100%);
    }
    .gallery-strip::after {
      content: ''; position: absolute; bottom: 0; left: 0; right: 0;
      height: 90px; z-index: 2; pointer-events: none;
      background: linear-gradient(to top, rgba(252,228,236,0.96) 0%, transparent 100%);
    }
    .gallery-track {
      position: absolute; top: 0; left: 0; right: 0;
      display: flex; flex-direction: column; gap: 10px; padding: 10px;
      will-change: transform;
    }
    @keyframes scrollUp   { from{transform:translateY(0)} to{transform:translateY(var(--half-h))} }
    @keyframes scrollDown { from{transform:translateY(var(--half-h))} to{transform:translateY(0)} }

    .gallery-photo {
      width: 100%; aspect-ratio: 3/4; object-fit: cover;
      border-radius: 1.1rem; display: block; flex-shrink: 0;
      box-shadow: 0 4px 18px rgba(194,24,91,0.18);
      border: 2px solid rgba(255,255,255,0.75);
      transition: transform 0.3s ease;
    }
    .gallery-photo:hover { transform: scale(1.04); }
    .gallery-placeholder {
      width: 100%; aspect-ratio: 3/4; border-radius: 1.1rem; flex-shrink: 0;
      background: linear-gradient(145deg, rgba(255,255,255,0.55), rgba(244,143,177,0.25));
      border: 2px dashed rgba(244,143,177,0.5);
      display: flex; align-items: center; justify-content: center;
      font-size: 1.8rem; color: var(--pink-mid);
    }
    @media(max-width:820px){ .gallery-strip{ display:none; } }

    /* ══════════════════════════════
       GLASS CARD
    ══════════════════════════════ */
    .card {
      background-size: cover; background-position: center;
      background-color: #fff;
      border-radius: 2.8rem;
      padding: 3rem 4rem 2.8rem;
      max-width: 560px; width: 100%;
      position: relative; overflow: hidden;
      border: 1.5px solid rgba(255,255,255,0.88);
      box-shadow: 0 10px 54px rgba(194,24,91,0.22), 0 1.5px 0 rgba(255,255,255,0.9) inset;
      animation: cardIn 1s cubic-bezier(.23,1,.32,1) both;
    }
    .card::before {
      content: ''; position: absolute; inset: 0; z-index: 0;
      background: rgba(255,255,255,0.70);
      backdrop-filter: blur(16px) saturate(160%);
      -webkit-backdrop-filter: blur(16px) saturate(160%);
      border-radius: inherit;
    }
    .card > * { position: relative; z-index: 1; }

    @keyframes cardIn {
      from { opacity:0; transform:translateY(50px) scale(0.94); }
      to   { opacity:1; transform:none; }
    }

    /* ══════════════════════════════
       NAMES
       — shimmer lives on each .letter span
       — .names element itself has NO color/animation
    ══════════════════════════════ */
    .names {
      font-family: 'Assistant', sans-serif;
      font-size: clamp(2.6rem, 7vw, 4.4rem);
      font-weight: 800;
      text-align: center;
      line-height: 1.1;
    }
    .names .letter {
      display: inline-block;
      background: linear-gradient(90deg, #c2185b 0%, #e91e63 45%, #f48fb1 60%, #c2185b 100%);
      background-size: 250% auto;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      /* 3 animations: drop-in | float | shimmer */
      animation: letterDrop 0.6s ease both,
                 floatLetter 3.4s ease-in-out infinite,
                 shimmerLtr  4s   linear      infinite;
    }
    @keyframes letterDrop {
      0%   { opacity:0; transform:translateY(-40px) scale(0.65) rotate(-8deg); }
      65%  { transform:translateY(5px) scale(1.07) rotate(2deg); }
      100% { opacity:1; transform:none; }
    }
    @keyframes floatLetter {
      0%,100% { transform:translateY(0); }
      50%     { transform:translateY(-5px); }
    }
    @keyframes shimmerLtr { to { background-position: 250% center; } }

    /* ampersand: solid color, no shimmer */
    .names .ampersand {
      display: inline-block;
      font-size: 0.6em;
      background: none !important;
      -webkit-text-fill-color: var(--pink-mid) !important;
      color: var(--pink-mid);
      margin: 0 0.28em;
      animation: letterDrop 0.6s ease both,
                 pulse 2.6s 2s ease-in-out infinite !important;
    }
    @keyframes pulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.26)} }

    /* ── DIVIDER ── */
    .divider {
      display: flex; align-items: center; gap: 0.9rem;
      margin: 1rem 0 0.8rem;
      animation: fadeUp 0.8s 1.3s ease both;
    }
    .divider-line { flex:1; height:1px; background:linear-gradient(90deg,transparent,var(--pink-mid),transparent); }
    .divider-heart { color:var(--rose); font-size:1.1rem; animation:pulse 2s 2.3s infinite; }

    /* ── DATE ── */
    .jewish-date {
      text-align: center;
      font-size: clamp(2rem, 5.5vw, 3rem);
      font-weight: 800;
      color: var(--pink-dark);
      letter-spacing: 0.03em;
      margin-bottom: 0.15rem;
      animation: fadeUp 0.8s 1.4s ease both;
    }
    .sub-label {
      text-align: center;
      font-size: clamp(0.9rem, 2vw, 1.1rem);
      font-weight: 700;
      color: #b03060;
      margin-bottom: 1.4rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      animation: fadeUp 0.8s 1.5s ease both;
    }

    /* ── COUNTDOWN ── */
    .countdown {
      display: grid; grid-template-columns: repeat(4,1fr); gap: 0.85rem;
      animation: fadeUp 0.8s 1.6s ease both;
    }
    .unit {
      display: flex; flex-direction: column; align-items: center;
      background: linear-gradient(160deg, rgba(255,255,255,0.93), rgba(252,228,236,0.6));
      border: 1px solid rgba(244,143,177,0.45);
      border-radius: 1.3rem;
      padding: 0.9rem 0.4rem 0.7rem;
      box-shadow: 0 4px 18px rgba(194,24,91,0.1);
      transition: transform 0.2s ease;
    }
    .unit:hover { transform:translateY(-4px) scale(1.05); }
    .unit-num {
      font-size: clamp(1.9rem, 5vw, 3rem);
      font-weight: 800;
      color: var(--pink-dark);
      line-height: 1;
      text-shadow: 0 2px 10px rgba(194,24,91,0.2);
    }
    .unit-num.flip { animation: flip 0.25s ease; }
    @keyframes flip {
      0%  { transform:scaleY(1); }
      40% { transform:scaleY(0); }
      100%{ transform:scaleY(1); }
    }
    .unit-label {
      font-size: clamp(0.6rem, 1.4vw, 0.75rem);
      font-weight: 700;
      color: #c06070;
      margin-top: 0.28rem;
      letter-spacing: 0.07em;
      text-transform: uppercase;
    }

    /* ── UPLOAD BTN ── */
    .upload-wrap {
      display: flex; justify-content: center;
      margin-top: 1.4rem;
      animation: fadeUp 0.8s 1.8s ease both;
    }
    #uploadBtn {
      background: linear-gradient(135deg, #f48fb1, #c2185b);
      color: #fff; border: none; cursor: pointer;
      padding: 0.5rem 1.25rem; border-radius: 2rem;
      font-family: 'Assistant', sans-serif;
      font-size: 0.85rem; font-weight: 700;
      letter-spacing: 0.04em;
      box-shadow: 0 4px 18px rgba(194,24,91,0.30);
      display: flex; align-items: center; gap: 0.4rem;
      transition: transform 0.18s, box-shadow 0.18s;
    }
    #uploadBtn:hover { transform:translateY(-2px) scale(1.05); box-shadow:0 8px 28px rgba(194,24,91,0.42); }
    #uploadBtn svg { width:14px; height:14px; stroke:#fff; stroke-width:2.2; fill:none; stroke-linecap:round; stroke-linejoin:round; }
    #fileInput { display:none; }

    @keyframes fadeUp {
      from { opacity:0; transform:translateY(22px); }
      to   { opacity:1; transform:none; }
    }

    @media(max-width:480px){
      .card { padding:2rem 1.2rem 1.8rem; border-radius:2rem; }
      .countdown { gap:0.5rem; }
    }
  </style>
</head>
<body>

<div id="bg-layer"></div>
<canvas id="hearts-canvas"></canvas>

<div id="page">

  <!-- LEFT gallery -->
  <div class="gallery-strip">
    <div class="gallery-track" id="track-left"></div>
  </div>

  <!-- CENTER card -->
  <div class="card" id="card">

    <div class="names" id="names-el"></div>

    <div class="divider">
      <div class="divider-line"></div>
      <span class="divider-heart">♥</span>
      <div class="divider-line"></div>
    </div>

    <div class="jewish-date">י"ח אייר תשפ"ו</div>
    <div class="sub-label">מתחתנים בעוד</div>

    <div class="countdown">
      <div class="unit"><span class="unit-num" id="cd-days">--</span><span class="unit-label">ימים</span></div>
      <div class="unit"><span class="unit-num" id="cd-hours">--</span><span class="unit-label">שעות</span></div>
      <div class="unit"><span class="unit-num" id="cd-min">--</span><span class="unit-label">דקות</span></div>
      <div class="unit"><span class="unit-num" id="cd-sec">--</span><span class="unit-label">שניות</span></div>
    </div>

    <div class="upload-wrap">
      <button id="uploadBtn" onclick="document.getElementById('fileInput').click()">
        <svg viewBox="0 0 24 24"><polyline points="16 16 12 12 8 16"/><line x1="12" y1="12" x2="12" y2="21"/><path d="M20.39 18.39A5 5 0 0018 9h-1.26A8 8 0 103 16.3"/></svg>
        העלו תמונת רקע
      </button>
      <input type="file" id="fileInput" accept="image/*"/>
    </div>

  </div><!-- /card -->

  <!-- RIGHT gallery -->
  <div class="gallery-strip">
    <div class="gallery-track" id="track-right"></div>
  </div>

</div><!-- /page -->

<script>
/* ══════════════════════════════
   NAMES — animated letter by letter
══════════════════════════════ */
const namesEl = document.getElementById('names-el');
let delay = 0.25;

function addLetters(word) {
  word.split('').forEach(ch => {
    const s = document.createElement('span');
    s.className = 'letter';
    s.textContent = ch;
    // all 3 animations share the same entry delay
    s.style.animationDelay = `${delay}s, ${delay}s, ${delay}s`;
    namesEl.appendChild(s);
    delay += 0.09;
  });
}

addLetters('שמחה');

const amp = document.createElement('span');
amp.className = 'ampersand';
amp.innerHTML = '&amp;';
amp.style.animationDelay = `${delay}s, ${delay}s`;
namesEl.appendChild(amp);
delay += 0.15;

addLetters('אסתי');

/* ══════════════════════════════
   COUNTDOWN
══════════════════════════════ */
const weddingDate = new Date('2026-05-05T18:00:00');

function pad(n){ return String(n).padStart(2,'0'); }

function flipNum(el, val){
  const str = pad(val);
  if(el.textContent !== str){
    el.classList.remove('flip');
    void el.offsetWidth;
    el.classList.add('flip');
    el.textContent = str;
  }
}

function tick(){
  const diff = weddingDate - new Date();
  if(diff <= 0){
    ['cd-days','cd-hours','cd-min','cd-sec'].forEach(id =>
      document.getElementById(id).textContent = '00');
    return;
  }
  flipNum(document.getElementById('cd-days'),  Math.floor(diff / 86400000));
  flipNum(document.getElementById('cd-hours'), Math.floor((diff % 86400000) / 3600000));
  flipNum(document.getElementById('cd-min'),   Math.floor((diff % 3600000)  / 60000));
  flipNum(document.getElementById('cd-sec'),   Math.floor((diff % 60000)    / 1000));
}
tick();
setInterval(tick, 1000);

/* ══════════════════════════════
   CARD BACKGROUND IMAGE
══════════════════════════════ */
const card = document.getElementById('card');
function applyCardBg(url){ card.style.backgroundImage = `url(${url})`; }
try { const s = localStorage.getItem('wedding_card_bg'); if(s) applyCardBg(s); } catch(e){}

document.getElementById('fileInput').addEventListener('change', function(){
  const file = this.files[0]; if(!file) return;
  const r = new FileReader();
  r.onload = e => {
    applyCardBg(e.target.result);
    try { localStorage.setItem('wedding_card_bg', e.target.result); } catch(ex){}
  };
  r.readAsDataURL(file);
});

/* ══════════════════════════════
   FLOATING HEARTS
══════════════════════════════ */
const canvas = document.getElementById('hearts-canvas');
const ctx    = canvas.getContext('2d');
function resize(){ canvas.width = innerWidth; canvas.height = innerHeight; }
resize(); window.addEventListener('resize', resize);

const HCOLORS = ['#f48fb1','#e91e63','#c2185b','#ff80ab','#fce4ec','#ff4081','#ffb3c6'];
function heartPath(cx,cy,sz){
  ctx.save(); ctx.translate(cx,cy); ctx.scale(sz,sz);
  ctx.beginPath(); ctx.moveTo(0,-0.5);
  ctx.bezierCurveTo( 0.5,-1, 1,-0.2, 0, 0.7);
  ctx.bezierCurveTo(-1,-0.2,-0.5,-1, 0,-0.5);
  ctx.closePath(); ctx.restore();
}
const hearts = Array.from({length:30}, () => ({
  x: Math.random()*innerWidth, y: Math.random()*innerHeight+innerHeight,
  size: 5+Math.random()*16, speed: 0.3+Math.random()*0.7,
  drift: (Math.random()-0.5)*0.55, opacity: 0.1+Math.random()*0.5,
  color: HCOLORS[Math.floor(Math.random()*HCOLORS.length)],
  wobble: Math.random()*Math.PI*2, wobbleSpeed: 0.013+Math.random()*0.02,
}));
function animateHearts(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  hearts.forEach(h => {
    h.y -= h.speed; h.wobble += h.wobbleSpeed;
    h.x += Math.sin(h.wobble)*0.55 + h.drift;
    if(h.y < -40){ h.y = canvas.height+30; h.x = Math.random()*canvas.width; }
    ctx.save(); ctx.globalAlpha = h.opacity; ctx.fillStyle = h.color;
    heartPath(h.x,h.y,h.size); ctx.fill(); ctx.restore();
  });
  requestAnimationFrame(animateHearts);
}
animateHearts();

/* ══════════════════════════════
   PHOTO GALLERIES
══════════════════════════════ */
const PHOTOS = [
  'images/IMG_0812_1024x768.jpg','images/IMG_0818_1024x768.JPG','IMG_0822_1024x768.JPG',
  'images/IMG-20260117-WA0001 (4) (1).jpg','images/IMG_0823_1024x768.JPG','IMG_0824_1024x768.JPG',
   'images/IMG_0825_1024x768.jpg','images/IMG_20260121_220935_121.JPG','IMG_0824_1024x768.JPG',
   'images/IMG-20260117-WA0001 (4) (1).jpg','images/IMG_0823_1024x768.JPG','IMG_0824_1024x768.JPG',
   'images/IMG_0825_1024x768.jpg','images/IMG_20260121_220935_121.JPG','IMG_0824_1024x768.JPG',
   'images/IMG-20260117-WA0001 (4) (1).jpg','images/IMG_0823_1024x768.JPG','IMG_0824_1024x768.JPG',
   'images/IMG_0825_1024x768.jpg','images/IMG_20260121_220935_121.JPG','IMG_0824_1024x768.JPG',
   'images/IMG-20260117-WA0001 (4) (1).jpg','images/IMG_0823_1024x768.JPG','IMG_0824_1024x768.JPG',
   'images/IMG_0825_1024x768.jpg','images/IMG_20260121_220935_121.JPG','IMG_0824_1024x768.JPG',
  ];

function buildTrack(trackId, reverse){
  const trackEl = document.getElementById(trackId);
  // Double the list for seamless loop
  [...PHOTOS, ...PHOTOS].forEach(src => {
    const img = document.createElement('img');
    img.className = 'gallery-photo';
    img.src = src;
    img.alt = '';
    img.onerror = function(){
      const ph = document.createElement('div');
      ph.className = 'gallery-placeholder';
      ph.textContent = '♥';
      this.replaceWith(ph);
    };
    trackEl.appendChild(img);
  });

  // After paint: measure item height, set CSS var, start animation
  setTimeout(() => {
    const first = trackEl.firstElementChild;
    const itemH = first ? first.getBoundingClientRect().height : 160;
    const halfH = PHOTOS.length * (itemH + 10);   // 10px gap
    const dur   = PHOTOS.length * 5;              // seconds total

    trackEl.style.setProperty('--half-h', `-${halfH}px`);
    trackEl.style.animation =
      `${reverse ? 'scrollDown' : 'scrollUp'} ${dur}s linear infinite`;
  }, 600);
}

buildTrack('track-left',  false);
buildTrack('track-right', true);
</script>
</body>
</html>
